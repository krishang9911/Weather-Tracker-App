<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    padding: 20px;
}
        .container {
            max-width: 1300px;
            margin: auto;
        }

        .parent-card {
    display: flex;
    flex-direction: column;  /* stack vertically */
    gap: 50px;
}

        h1 {
    text-align: center;
    color: #554d4e;  /* orange */
    margin-bottom: 20px;
}

       .card {
    background: #f9f2ee;  /* slightly warm white */
    border-radius: 12px;
    padding: 20px;
    box-shadow: 2px 4px rgb(212, 195, 177);
    width: 1200px;
    margin-left: 50px;
       }
        .input-group {
    display: flex;
    gap: 10px;
    margin-top: 20px;  /* pushes it slightly down */
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #fb8959;  /* warmer + darker orange */
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

    button:hover {
    background: #f9956d;  /* deeper shade */
}

    button:active {
    transform: scale(0.97);
}

        .weather-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin-bottom: 6px;
    background: #f1f3f6;
    border-radius: 6px;
}
        .console {
            background: #161E54;
            color: #BBE0EF;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
        }

        .log.async {
            border-left: 3px solid #F16D34;
            padding-left: 6px;
        }

        .log.promise {
            border-left: 3px solid #FF986A;
            padding-left: 6px;
        }

        .log.callback {
            border-left: 3px solid #BBE0EF;
            padding-left: 6px;
        }

        .history button {
    margin: 5px;
    padding: 5px 10px;
    border-radius: 15px;
    background: #ffd27f;
    border: none;
}

hr{
    border: none;
    height: 2px;
    background-color:#565252;
}

        @media (max-width:700px) {
            .parent-card {
                flex-direction: column;
            }
        }


        h3[id="info"]{
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>
        <hr><br><br>

        <div class="parent-card">

            <div class="card" id="weather-info">
                <h3 id = "info">Weather Info</h3>
                <div id="weather"></div>
            </div>

            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>
        const API_KEY = "660e128c140b552988a795d0c1d2f35c";
        //    const API_KEY = "660e128c140b552988a795d0c1d2f35c";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) { 
                const err = await res.json();
                console.log(err);
                throw new Error(err.message);
            }
            const data = await res.json();
            return data;
        }

         /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            let cities = localStorage.getItem("cities");
            if (!cities){
                cities = [];
            }else{
                cities = JSON.parse(cities);
            }

            // Avoid duplicates
            let exists = false;
            for (let i=0; i<cities.length; i++){
                if (city === cities[i]){
                    exists = true;
                    break;
                }
            }
            if(!exists){
                cities.push(city);
            }

            localStorage.setItem("cities", JSON.stringify(cities));

            // Update UI
            showHistory()
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            let cities = localStorage.getItem("cities");
           
            if (!cities) return

            cities = JSON.parse(cities);

            historyBox.innerHTML = "";

            for (let i=0; i<cities.length; i++){
                let btn = document.createElement("button");
                btn.innerText = cities[i];
                btn.onclick = () => {
                    search(cities[i])
                }
                historyBox.appendChild(btn);
            }
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
       
        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
